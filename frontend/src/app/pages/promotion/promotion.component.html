<section class="promotions-section" id="promociones">
  <div class="slider" *ngIf="promotions.length > 0">

    <div class="slide">
      <img
        [src]="promotions[currentIndex].imagen"
        [alt]="promotions[currentIndex].titulo"
        class="slide-image"
      />

      <div class="slide-overlay">
        <h2>{{ promotions[currentIndex].titulo }}</h2>
        <p>{{ promotions[currentIndex].descripcion }}</p>
      </div>
    </div>

    <button class="nav-btn prev" (click)="prevSlide()">❮</button>
    <button class="nav-btn next" (click)="nextSlide()">❯</button>

    <div class="dots">
      <span
        *ngFor="let promo of promotions; let i = index"
        class="dot"
        [class.active]="i === currentIndex"
        (click)="goToSlide(i)"
      ></span>
    </div>

  </div>
</section>
